<!DOCTYPE html>
<html>
<head>
    <title>Form Project - Sukuna</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #111;
            color: #fff;
        }
        form {
            margin-top: 50px;
        }
        input[type="text"], input[type="email"] {
            padding: 10px;
            margin: 10px;
            border-radius: 5px;
            border: none;
        }
        input[type="submit"] {
            padding: 10px 20px;
            background-color: crimson;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        #result {
            margin-top: 30px;
            display: none;
        }
        img {
            width: 300px;
            border-radius: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Fill the Form to Reveal Sukuna</h1>
    <form onsubmit="showSukuna(event)">
        <input type="text" placeholder="Enter your name" required><br>
        <input type="email" placeholder="Enter your email" required><br>
        <input type="submit" value="Submit">
    </form>

    <div id="result">
        <h2>🔥 Here is Sukuna 🔥</h2>
        <img src="https://i.pinimg.com/564x/8a/6b/5b/8a6b5b9f7f9b6a7a7f9b6a7a7f9b6a7a.jpg" alt="Sukuna Anime Boy">
    </div>

    <script>
        function showSukuna(event) {
            event.preventDefault();
            document.getElementById("result").style.display = "block";
        }
    </script>
</body>
</html>
